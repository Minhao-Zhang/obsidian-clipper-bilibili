# Publishes unofficial fork builds to this repo's Releases (not Obsidian's).
# Official releases: https://github.com/obsidianmd/obsidian-clipper/releases
name: Release (fork)

on:
  push:
    tags:
      # Same shape as upstream tags (e.g. 1.5.1), not v1.5.1 — see obsidianmd/obsidian-clipper releases
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm test

      # Same as upstream: Chrome + Firefox + Safari extension zips (see webpack ZipPlugin)
      - run: npm run build

      - name: Stage release zips
        run: |
          mkdir -p release-assets
          shopt -s nullglob
          zips=(builds/obsidian-web-clipper-fork-*.zip)
          if [ ${#zips[@]} -ne 3 ]; then
            echo "Expected exactly 3 browser zips (chrome, firefox, safari); found ${#zips[@]}"
            ls -la builds/ || true
            exit 1
          fi
          for browser in chrome firefox safari; do
            if ! printf '%s\n' "${zips[@]}" | grep -q -- "-${browser}.zip$"; then
              echo "Missing ${browser} zip in builds/"
              exit 1
            fi
          done
          for z in "${zips[@]}"; do
            cp "$z" "release-assets/$(basename "$z")"
          done
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: 'Obsidian Web Clipper fork — ${{ github.ref_name }}'
          body: |
            ### About this release

            This is an unofficial fork of [Obsidian Web Clipper](https://github.com/obsidianmd/obsidian-clipper) with personal workflow changes. Please compare this repository's code and commit history with upstream for the exact differences.

            If you want the official, store-distributed extension, use [obsidian.md/clipper](https://obsidian.md/clipper) or the [Chrome Web Store listing](https://chromewebstore.google.com/detail/obsidian-web-clipper/cnjifjpddelmedmihgijeibhnjfabmlf).

            ### Installation (sideloading)

            1. Download the zip for your browser from **Assets** on this page: `obsidian-web-clipper-fork-chrome.zip`, `obsidian-web-clipper-fork-firefox.zip`, or `obsidian-web-clipper-fork-safari.zip`.
            2. **Chromium browsers** (Chrome, Edge, Brave, etc.): unzip the file, open `chrome://extensions` (`edge://extensions` for Edge, usually `brave://extensions` for Brave), enable **Developer mode**, choose **Load unpacked**, and select the extracted folder. Do not load the zip directly.
            3. **Firefox**: unzip the file, open `about:debugging#/runtime/this-firefox`, choose **Load Temporary Add-on**, and select `manifest.json` from the extracted folder.
            4. **Safari**: unzip the file and install it using the usual system and Apple workflow for Safari web extensions. If you need official support, use [obsidian.md/clipper](https://obsidian.md/clipper).

            Sideloading is at your own risk. For the official store version and documentation, see [obsidian.md/clipper](https://obsidian.md/clipper).

            ### 关于此版本

            这是 [Obsidian Web Clipper](https://github.com/obsidianmd/obsidian-clipper) 的非官方 fork，包含个人工作流改动。与上游官方版的准确差异，请对比本仓库代码和提交记录。

            如果你想使用官方商店分发的扩展，请使用 [obsidian.md/clipper](https://obsidian.md/clipper) 或 [Chrome Web Store 页面](https://chromewebstore.google.com/detail/obsidian-web-clipper/cnjifjpddelmedmihgijeibhnjfabmlf)。

            ### 安装说明（侧载）

            1. 在本页 **Assets** 下载与你的浏览器对应的 zip：`obsidian-web-clipper-fork-chrome.zip`、`obsidian-web-clipper-fork-firefox.zip` 或 `obsidian-web-clipper-fork-safari.zip`。  
            2. **Chromium 系**（Chrome、Edge、Brave 等）：解压 zip，打开 `chrome://extensions`（Edge 为 `edge://extensions`，Brave 多为 `brave://extensions`），开启 **开发者模式** → **加载已解压的扩展程序** → 选择解压后的文件夹（勿直接加载 zip）。  
            3. **Firefox**：解压后打开 `about:debugging#/runtime/this-firefox` → **临时载入附加组件** → 选择解压目录里的 `manifest.json`。  
            4. **Safari**：解压后按系统与 Apple 对 Safari 网页扩展的常见方式完成安装；需要官方支持请使用 [obsidian.md/clipper](https://obsidian.md/clipper)。  

            侧载有风险；商店正式版与官方说明见 [obsidian.md/clipper](https://obsidian.md/clipper)。
          files: release-assets/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
